name: npm - Publish @cocoar/secrets

# Manual, on-demand publish for the TypeScript client. @cocoar/secrets versions and ships INDEPENDENTLY
# of the .NET (NuGet) packages — it is NOT tied to a vX.Y.Z .NET release tag. The published version is
# whatever is in src/ts/secrets/package.json; bump it there, merge, then run this workflow.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run — build, test and pack, but do NOT publish to npm"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test & publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./src/ts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}   # branch selected in the UI

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: src/ts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Resolve version
        run: |
          VERSION=$(node -p "require('./secrets/package.json').version")
          echo "Publishing @cocoar/secrets@$VERSION (dry-run=${{ inputs.dry-run }})"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter @cocoar/secrets publish --no-git-checks ${{ inputs.dry-run && '--dry-run' || '' }}
