name: PR Validation

on:
  pull_request:
    branches: [ develop ]

jobs:
  test:
    name: Test on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core x64 platforms
          - os: ubuntu-latest
            platform: linux-x64
            arch: x64
          - os: windows-latest  
            platform: windows-x64
            arch: x64
          - os: macos-latest
            platform: macos-x64
            arch: x64
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --no-restore --logger "console;verbosity=detailed"
        env:
          PLATFORM_INFO: "${{ matrix.platform }} on ${{ runner.os }} (${{ runner.arch }})"

      - name: Platform test results
        if: always()
        run: |
          echo "Platform: ${{ matrix.platform }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"

