name: PR Validation

on:
  pull_request:
    branches: [ develop ]
    paths:
      - 'src/**'
      - '.github/workflows/**'

jobs:
  test-multiplatform:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Calculate version
        id: gv
        uses: gittools/actions/gitversion/execute@v3

      - name: Log calculated version
        run: echo "GitVersion calculated version ${{ steps.gv.outputs.SemVer }}"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./src

      - name: Build solution
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.gv.outputs.SemVer }} -p:AssemblyVersion=${{ steps.gv.outputs.AssemblySemVer }} -p:FileVersion=${{ steps.gv.outputs.AssemblySemFileVer }}
        working-directory: ./src

      - name: Run tests
        run: dotnet test -c Release --no-build --no-restore --verbosity normal --filter "Type!=Performance"
        working-directory: ./src

      - name: Validate packaging
        run: dotnet pack -c Release --no-restore -p:Version=${{ steps.gv.outputs.SemVer }}
        working-directory: ./src

