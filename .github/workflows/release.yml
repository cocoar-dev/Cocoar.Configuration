name: Release

on:
  release:
    types: [created, edited]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Core x64 platforms
          - os: ubuntu-latest
            platform: linux-x64
            arch: x64
          - os: windows-latest  
            platform: windows-x64
            arch: x64
          - os: macos-latest
            platform: macos-x64
            arch: x64
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --no-restore --logger "console;verbosity=detailed"
        env:
          PLATFORM_INFO: "${{ matrix.platform }} on ${{ runner.os }} (${{ runner.arch }})"

      - name: Platform test results
        if: always()
        run: |
          echo "Platform: ${{ matrix.platform }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"

  build:
    name: Build and publish packages  
    runs-on: ubuntu-latest
    needs: test
    if: contains(needs.test.result, 'success')
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: '5.x'

      - name: Calculate version
        id: gv
        uses: gittools/actions/gitversion/execute@v1

      - name: Show calculated version
        run: |
          echo "NuGet version: ${{ steps.gv.outputs.SemVer }}"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:Version=${{ steps.gv.outputs.SemVer }}


      - name: Add GitHub NuGet source
        run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
      
      - name: Push to GitHub Packages
        run: |
          shopt -s nullglob
          for pkg in ./nupkgs/*.nupkg; do
            case "$pkg" in
              *.symbols.nupkg) continue ;;
            esac
            echo "➡️ pushing $pkg"
            dotnet nuget push "$pkg" --source github --skip-duplicate --api-key "${{ secrets.GITHUB_TOKEN }}"
          done
        
      - name: Push to NuGet.org
        if: success()
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          for pkg in ./nupkgs/*.nupkg; do
            case "$pkg" in
              *.symbols.nupkg) continue ;;
            esac
            echo "➡️ pushing $pkg to nuget.org"
            dotnet nuget push "$pkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Push symbols to NuGet.org
        if: success()
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          for pkg in ./nupkgs/*.snupkg; do
            echo "➡️ pushing symbols $pkg to nuget.org"
            dotnet nuget push "$pkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ steps.gv.outputs.SemVer }}
          path: ./src/nupkgs/
    

